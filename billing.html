<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Billing - Pharmacy</title>
<link rel="stylesheet" href="style.css">

<link href="https://cdn.jsdelivr.net/npm/tom-select/dist/css/tom-select.bootstrap5.min.css" rel="stylesheet">

<style>

.ts-dropdown{
background:#ffffff !important;
border:1px solid #ccc;
box-shadow:0 4px 8px rgba(0,0,0,0.15);
z-index:9999 !important;
}

.ts-dropdown .option:hover{
background:#f1f1f1;
}

table{
margin-bottom:40px;
}

</style>

</head>

<body>

<div class="container">

<div class="sidebar">
<h2>Pharmacy</h2>
<a href="dashboard.html">Dashboard</a>
<a href="inventory.html">Inventory / Batch</a>
<a href="purchase.html">Purchase</a>
<a href="billing.html" class="active">Billing</a>
<a href="stock.html">Stock Alert</a>
<a href="expired.html">Expired Medicines</a>
<a href="expiring.html">Expiring Soon</a>
<a href="sales.html">Sales Report</a>
<a href="login.html">Logout</a>
</div>

<div class="main">

<h1>Create New Bill</h1>

<form id="billingForm">

<label>Prescription ID</label><br>
<input type="text" id="prescriptionId"><br><br>

<h3>Bill Items</h3>

<button type="button" id="addBillItemBtn">+ Add Item</button>

<table border="1" width="100%">
<thead>
<tr>
<th>Medicine</th>
<th>Batch</th>
<th>Quantity</th>
<th>Selling Price</th>
<th>Subtotal</th>
<th>Action</th>
</tr>
</thead>

<tbody id="billItemsBody"></tbody>

</table>

<h3>Total ₹ <span id="totalAmount">0</span></h3>

<button type="submit">Save Bill</button>

</form>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/tom-select/dist/js/tom-select.complete.min.js"></script>

<script>

let medicines=[]

async function loadMedicines(){
const res = await fetch("http://127.0.0.1:5000/medicines")
medicines = await res.json()
}

loadMedicines()

const tbody=document.getElementById("billItemsBody")
const totalSpan=document.getElementById("totalAmount")

document.getElementById("addBillItemBtn").addEventListener("click",addRow)

function addRow(){

const tr=document.createElement("tr")

tr.innerHTML=`
<td></td>
<td></td>
<td><input type="number" value="1" min="1"></td>
<td><input type="number" value="0" min="0"></td>
<td class="subtotal">0</td>
<td><button type="button">Delete</button></td>
`

const medSelect=document.createElement("select")

const defaultOpt=document.createElement("option")
defaultOpt.value=""
defaultOpt.textContent="Select Medicine"

medSelect.appendChild(defaultOpt)

const uniqueNames=[...new Set(medicines.map(m=>m.name))]

uniqueNames.forEach(name=>{
const opt=document.createElement("option")
opt.value=name
opt.textContent=name
medSelect.appendChild(opt)
})

tr.children[0].appendChild(medSelect)

const batchSelect=document.createElement("select")
tr.children[1].appendChild(batchSelect)

tbody.appendChild(tr)

new TomSelect(medSelect)

medSelect.addEventListener("change",()=>{

const selectedName=medSelect.value
batchSelect.innerHTML=""

medicines
.filter(m=>m.name===selectedName)
.forEach(m=>{
if(m.quantity>0){
const opt=document.createElement("option")
opt.value=m.batch
opt.textContent=m.batch+" (Qty:"+m.quantity+")"
batchSelect.appendChild(opt)
}
})

calculateTotal()

})

tr.querySelectorAll("input").forEach(inp=>{
inp.addEventListener("input",calculateTotal)
})

tr.querySelector("button").addEventListener("click",()=>{
tr.remove()
calculateTotal()
})

}

function calculateTotal(){

let total=0

tbody.querySelectorAll("tr").forEach(row=>{

const qty=parseInt(row.children[2].querySelector("input").value)||0
const price=parseFloat(row.children[3].querySelector("input").value)||0

const subtotal=qty*price

row.querySelector(".subtotal").innerText=subtotal

total+=subtotal

})

totalSpan.innerText=total

}

document.getElementById("billingForm").addEventListener("submit",async function(e){

e.preventDefault()

const items=[]

tbody.querySelectorAll("tr").forEach(row=>{

const name=row.children[0].querySelector("select").value
const batch=row.children[1].querySelector("select").value
const quantity=parseInt(row.children[2].querySelector("input").value)
const price=parseFloat(row.children[3].querySelector("input").value)

if(name && batch && quantity>0){

items.push({
name:name,
batch:batch,
quantity:quantity,
price:price
})

}

})

const res=await fetch("http://127.0.0.1:5000/sell",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({items:items})
})

const result=await res.json()

if(res.ok){
alert("Total ₹"+result.total)
location.reload()
}else{
alert(result.error)
}

})

</script>

</body>
</html>
