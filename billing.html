<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Billing - Pharmacy</title>
<link rel="stylesheet" href="style.css">

<link href="https://cdn.jsdelivr.net/npm/tom-select/dist/css/tom-select.bootstrap5.min.css" rel="stylesheet">

<style>

  .ts-dropdown{
background:#ffffff !important;
border:1px solid #ccc;
box-shadow:0 4px 8px rgba(0,0,0,0.15);
z-index:9999 !important;
}

.ts-dropdown .option{
background:#ffffff;
}

.ts-dropdown .option:hover{
background:#f1f1f1;
}

.ts-control{
background:#ffffff !important;
}

.ts-control{
z-index:1000;
}

.ts-dropdown{
z-index:9999 !important;
}

table{
margin-bottom:40px;
}

</style>

</head>

<body>

<div class="container">

<div class="sidebar">
<h2>Pharmacy</h2>
<a href="dashboard.html">Dashboard</a>
<a href="inventory.html">Inventory / Batch</a>
<a href="purchase.html">Purchase</a>
<a href="billing.html" class="active">Billing</a>
<a href="stock.html">Stock Alert</a>
<a href="expired.html">Expired Medicines</a>
<a href="expiring.html">Expiring Soon</a>
<a href="sales.html">Sales Report</a>
<a href="login.html">Logout</a>
</div>

<div class="main">

<div class="topbar">
<button class="menu-btn" onclick="toggleSidebar()">☰</button>
<h1>Create New Bill</h1>
</div>

<form id="billingForm">

<label>Prescription ID (if required)</label><br>
<input type="text" id="prescriptionId"><br><br>

<h3>Bill Items</h3>

<button type="button" id="addBillItemBtn">+ Add Item</button>

<table>

<thead>
<tr>
<th>Medicine</th>
<th>Batch</th>
<th>Quantity</th>
<th>Price</th>
<th>Subtotal</th>
<th>Action</th>
</tr>
</thead>

<tbody id="billItemsBody"></tbody>

</table>

<h3>Total ₹ <span id="totalAmount">0</span></h3>

<button type="submit">Save Bill</button>

</form>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/tom-select/dist/js/tom-select.complete.min.js"></script>

<script>

function toggleSidebar(){
document.querySelector(".sidebar").classList.toggle("collapsed")
}

let medicines=[]

async function loadMedicines(){

const res = await fetch("http://127.0.0.1:5000/medicines?t="+Date.now())

medicines = await res.json()

}

loadMedicines()

const tbody=document.getElementById("billItemsBody")
const totalSpan=document.getElementById("totalAmount")

document.getElementById("addBillItemBtn").addEventListener("click",addRow)

function addRow(){

const tr=document.createElement("tr")

tr.innerHTML=`
<td></td>
<td></td>
<td><input type="number" name="quantity" value="1" min="1"></td>
<td><input type="number" name="price" value="0" readonly></td>
<td class="subtotal">0</td>
<td><button type="button" class="deleteBtn">Delete</button></td>
`

const medSelect=document.createElement("select")
medSelect.name="medicineName"

const defaultOpt=document.createElement("option")
defaultOpt.value=""
defaultOpt.textContent="Select Medicine"

medSelect.appendChild(defaultOpt)

const uniqueNames=[...new Set(medicines.map(m=>m.name))]

uniqueNames.forEach(name=>{
const opt=document.createElement("option")
opt.value=name
opt.textContent=name
medSelect.appendChild(opt)
})

tr.children[0].appendChild(medSelect)

const batchSelect=document.createElement("select")
batchSelect.name="batchNo"

tr.children[1].appendChild(batchSelect)

tbody.appendChild(tr)

new TomSelect(medSelect,{maxOptions:50})

medSelect.addEventListener("change",()=>{

const selectedName=medSelect.value

batchSelect.innerHTML=""

medicines
.filter(m=>m.name===selectedName)
.forEach(m=>{

if(m.quantity>0){

const opt=document.createElement("option")

opt.value=m.batch
opt.textContent=m.batch+" (Qty:"+m.quantity+")"

batchSelect.appendChild(opt)

}

})

const med=medicines.find(m=>m.name===selectedName)

if(med){
tr.querySelector('input[name="price"]').value=med.price
}

calculateTotal()

})

tr.querySelector('input[name="quantity"]').addEventListener("input",calculateTotal)

tr.querySelector(".deleteBtn").addEventListener("click",()=>{
tr.remove()
calculateTotal()
})

}

function calculateTotal(){

let total=0

tbody.querySelectorAll("tr").forEach(row=>{

const qty=parseInt(row.querySelector('input[name="quantity"]').value)||0
const price=parseFloat(row.querySelector('input[name="price"]').value)||0

const subtotal=qty*price

row.querySelector(".subtotal").innerText=subtotal

total+=subtotal

})

totalSpan.innerText=total

}

document.getElementById("billingForm").addEventListener("submit",async function(e){

e.preventDefault()

const prescriptionId=document.getElementById("prescriptionId").value

const items=[]

tbody.querySelectorAll("tr").forEach(row=>{

const name=row.querySelector('select[name="medicineName"]').value
const batch=row.querySelector('select[name="batchNo"]').value
const quantity=parseInt(row.querySelector('input[name="quantity"]').value)

if(name && batch && quantity>0){

items.push({
name:name,
batch:batch,
quantity:quantity
})

}

})

if(items.length===0){
alert("Please add at least one valid medicine.")
return
}

try{

const res=await fetch("http://127.0.0.1:5000/sell",{

method:"POST",
headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
prescription_id:prescriptionId,
items:items
})

})

const result=await res.json()

if(res.ok){

alert("Sale completed! Total ₹"+result.total)

tbody.innerHTML=""
totalSpan.innerText="0"
document.getElementById("billingForm").reset()

await loadMedicines()

}
else{

alert(result.error)

}

}
catch(err){

alert("Server Error")

}

})

</script>

</body>
</html>
