<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Billing - Pharmacy</title>
  <link rel="stylesheet" href="style.css" />

  <!-- Tom Select CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/tom-select/dist/css/tom-select.bootstrap5.min.css"
    rel="stylesheet"
  />
</head>
<body>
  <div class="container">
    <div class="sidebar">
      <h2>Pharmacy</h2>
      <a href="dashboard.html">Dashboard</a>
      <a href="inventory.html">Inventory / Batch</a>
      <a href="purchase.html">Purchase</a>
      <a href="billing.html" class="active">Billing</a>
      <a href="stock.html">Stock Alert</a>
      <a href="expired.html">Expired Medicines</a>
      <a href="expiring.html">Expiring Soon</a>
      <a href="sales.html">Sales Report</a>
      <a href="login.html">Logout</a>
    </div>

    <div class="main">
      <div class="topbar">
        <button class="menu-btn" onclick="toggleSidebar()">☰</button>
        <h1>Create New Bill</h1>
      </div>

      <form id="billingForm">
        <label for="prescriptionId">Prescription ID (if required)</label><br />
        <input type="text" id="prescriptionId" name="prescriptionId" /><br /><br />

        <h3>Bill Items</h3>
        <table>
          <thead>
            <tr>
              <th>Medicine Name</th>
              <th>Batch No</th>
              <th>Quantity</th>
              <th>Price per Unit (₹)</th>
              <th>Subtotal (₹)</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="billItemsBody"></tbody>
        </table>

        <button type="button" id="addBillItemBtn">+ Add Item</button><br /><br />

        <h3>Total: ₹<span id="totalAmount">0.00</span></h3>

        <button type="submit">Save Bill</button>
      </form>
    </div>
  </div>

  <!-- Tom Select JS -->
  <script src="https://cdn.jsdelivr.net/npm/tom-select/dist/js/tom-select.complete.min.js"></script>

  <script>
    // Sample medicines with prescription flag, price and batches
    const medicines = [
      { name: "Paracetamol", price: 20, prescription_required: false, batches: [{ batchNo: "P001", qty: 50, expiry: "2026-09-30" }, { batchNo: "P002", qty: 30, expiry: "2026-12-31" }] },
      { name: "Amoxicillin", price: 50, prescription_required: true, batches: [{ batchNo: "A100", qty: 10, expiry: "2026-08-15" }, { batchNo: "A101", qty: 0, expiry: "2026-07-01" }] },
      { name: "Ibuprofen", price: 30, prescription_required: false, batches: [{ batchNo: "I001", qty: 20, expiry: "2026-10-10" }] },
      { name: "Morphine", price: 100, prescription_required: true, batches: [{ batchNo: "M001", qty: 5, expiry: "2026-05-05" }] }
    ];

    function toggleSidebar() {
      document.querySelector(".sidebar").classList.toggle("collapsed");
    }

    const addBillItemBtn = document.getElementById("addBillItemBtn");
    const tbody = document.getElementById("billItemsBody");
    const totalAmountSpan = document.getElementById("totalAmount");

    function createMedicineSelect() {
      const select = document.createElement("select");
      select.name = "medicineName";
      select.required = true;
      select.classList.add("medicine-select");
      const defaultOption = document.createElement("option");
      defaultOption.value = "";
      defaultOption.textContent = "-- Select Medicine --";
      defaultOption.disabled = true;
      defaultOption.selected = true;
      select.appendChild(defaultOption);
      medicines.forEach((med) => {
        const option = document.createElement("option");
        option.value = med.name;
        option.textContent = med.name;
        select.appendChild(option);
      });
      return select;
    }

    function createBatchSelect() {
      const select = document.createElement("select");
      select.name = "batchNo";
      select.required = true;
      select.classList.add("batch-select");
      const defaultOption = document.createElement("option");
      defaultOption.value = "";
      defaultOption.textContent = "-- Select Batch --";
      defaultOption.disabled = true;
      defaultOption.selected = true;
      select.appendChild(defaultOption);
      return select;
    }

    addBillItemBtn.addEventListener("click", () => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td></td>
        <td></td>
        <td><input type="number" name="quantity" min="1" value="1" required /></td>
        <td><input type="number" name="price" min="0" step="0.01" value="0" required readonly /></td>
        <td class="subtotal">0.00</td>
        <td><button type="button" class="deleteBtn">Delete</button></td>
      `;

      const tdMedicine = tr.querySelector("td:nth-child(1)");
      const medicineSelect = createMedicineSelect();
      tdMedicine.appendChild(medicineSelect);

      const tdBatch = tr.querySelector("td:nth-child(2)");
      const batchSelect = createBatchSelect();
      tdBatch.appendChild(batchSelect);

      tbody.appendChild(tr);

      new TomSelect(medicineSelect, {
        maxOptions: 50,
        searchField: ["text"],
        onChange: (value) => {
          const med = medicines.find((m) => m.name === value);
          batchSelect.innerHTML = "";
          const defaultOption = document.createElement("option");
          defaultOption.value = "";
          defaultOption.textContent = "-- Select Batch --";
          defaultOption.disabled = true;
          defaultOption.selected = true;
          batchSelect.appendChild(defaultOption);
          if (med) {
            med.batches.forEach((batch) => {
              if (batch.qty > 0) {
                const option = document.createElement("option");
                option.value = batch.batchNo;
                option.textContent = `${batch.batchNo} (Expiry: ${batch.expiry}, Qty: ${batch.qty})`;
                option.dataset.qty = batch.qty;
                batchSelect.appendChild(option);
              }
            });
            tr.querySelector('input[name="price"]').value = med.price.toFixed(2);
            calculateTotal();
          }
        },
      });

      batchSelect.addEventListener("change", (e) => {
        const selectedOption = e.target.selectedOptions[0];
        const qtyAvailable = parseInt(selectedOption.dataset.qty) || 0;
        const qtyInput = tr.querySelector('input[name="quantity"]');
        qtyInput.max = qtyAvailable;
        if (qtyInput.value > qtyAvailable) qtyInput.value = qtyAvailable;
        calculateTotal();
      });

      tr.querySelector('input[name="quantity"]').addEventListener("input", () => {
        const qtyInput = tr.querySelector('input[name="quantity"]');
        const maxQty = parseInt(qtyInput.max) || 999999;
        if (qtyInput.value > maxQty) qtyInput.value = maxQty;
        if (qtyInput.value < 1) qtyInput.value = 1;
        calculateTotal();
      });

      tr.querySelector(".deleteBtn").addEventListener("click", () => {
        tr.remove();
        calculateTotal();
      });
    });

    function calculateTotal() {
      let total = 0;
      tbody.querySelectorAll("tr").forEach((row) => {
        const qty = parseInt(row.querySelector('input[name="quantity"]').value) || 0;
        const price = parseFloat(row.querySelector('input[name="price"]').value) || 0;
        const subtotal = qty * price;
        row.querySelector(".subtotal").innerText = subtotal.toFixed(2);
        total += subtotal;
      });
      totalAmountSpan.innerText = total.toFixed(2);
    }

    document.getElementById("billingForm").addEventListener("submit", function (e) {
      e.preventDefault();
      const prescriptionId = document.getElementById("prescriptionId").value.trim();
      const medicineSelects = [...document.querySelectorAll("select.medicine-select")];
      const requiresPrescription = medicineSelects.some((select) => {
        const medName = select.value;
        const med = medicines.find((m) => m.name === medName);
        return med && med.prescription_required;
      });

      if (requiresPrescription && prescriptionId === "") {
        alert("One or more medicines require a prescription. Please enter the Prescription ID.");
        return;
      }

      // Simulate saving bill
      alert("Bill saved successfully!");

      // Reset form
      this.reset();
      tbody.innerHTML = "";
      totalAmountSpan.innerText = "0.00";
    });
  </script>
</body>
</html>
