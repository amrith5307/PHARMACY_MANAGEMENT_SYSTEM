<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Purchase - Pharmacy</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <h2>Pharmacy</h2>
      <a href="dashboard.html">Dashboard</a>
      <a href="inventory.html">Inventory / Batch</a>
      <a href="purchase.html" class="active">Purchase</a>
      <a href="billing.html">Billing</a>
      <a href="stock.html">Stock Alert</a>
      <a href="expired.html">Expired Medicines</a>
      <a href="expiring.html">Expiring Soon</a>
      <a href="sales.html">Sales Report</a>
      <a href="login.html">Logout</a>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main">

      <!-- TOP BAR -->
      <div class="topbar">
        <button class="menu-btn" onclick="toggleSidebar()">☰</button>
        <h1>Record Purchase</h1>
      </div>

      <form id="purchaseForm">
        <h3>Purchase Items</h3>
        <table>
          <thead>
            <tr>
              <th>Medicine Name</th>
              <th>Batch No</th>
              <th>Mfg Date</th>
              <th>Expiry Date</th>
              <th>Quantity</th>
              <th>Cost Price (₹)</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="purchaseItemsBody">
          </tbody>
        </table>

        <button type="button" id="addPurchaseItemBtn">+ Add Item</button><br /><br />
        <button type="submit">Save Purchase</button>
      </form>

    </div>

  </div>

  <script>
    function toggleSidebar() {
      document.querySelector('.sidebar').classList.toggle('collapsed');
    }

    const addItemBtn = document.getElementById('addPurchaseItemBtn');
    const tbody = document.getElementById('purchaseItemsBody');

    addItemBtn.addEventListener('click', () => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td><input type="text" name="medicineName" required /></td>
        <td><input type="text" name="batchNo" required /></td>
        <td><input type="date" name="mfgDate" required /></td>
        <td><input type="date" name="expiryDate" required /></td>
        <td><input type="number" name="quantity" min="1" value="1" required /></td>
        <td><input type="number" name="costPrice" min="0" step="0.01" value="0" required /></td>
        <td><button type="button" onclick="removeRow(this)">Delete</button></td>
      `;
      tbody.appendChild(tr);
    });

    function removeRow(button) {
      button.closest('tr').remove();
    }

    document.getElementById('purchaseForm').addEventListener('submit', async e => {
      e.preventDefault();

      const rows = Array.from(tbody.querySelectorAll('tr'));
      if(rows.length === 0){
        alert("Add at least one purchase item!");
        return;
      }

      const items = rows.map(row => ({
        name: row.querySelector('input[name="medicineName"]').value,
        batch: row.querySelector('input[name="batchNo"]').value,
        mfg: row.querySelector('input[name="mfgDate"]').value,
        expiry: row.querySelector('input[name="expiryDate"]').value,
        quantity: row.querySelector('input[name="quantity"]').value,
        costPrice: row.querySelector('input[name="costPrice"]').value,
        prescription: "No"  // you can add a prescription column if needed
      }));

      try {
        const res = await fetch("http://127.0.0.1:5000/purchase", {
          method: "POST",
          headers: {"Content-Type":"application/json"},
          body: JSON.stringify({items})
        });

        const data = await res.json();
        alert(data.message);

        tbody.innerHTML = '';
      } catch(err){
        console.error(err);
        alert("Error saving purchase.");
      }
    });
  </script>
</body>
</html>
